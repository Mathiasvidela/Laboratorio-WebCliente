<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/checkout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <section class="mainCheckout">


    <!-- menu de productos y formulario de envío -->

        <div class="menuProductos">
            <div>
                <h1>Finalizar compra</h1>
                <p>Revisá tus productos y completá el envío</p>
            </div>

            <!--cards de productos del carrito, sin funcionalidad, solo para mostrar el diseño-->
            <div class="cardCompras">

                <div class="cardComprasTitulo">
                    <img class="cardImg" src="https://placehold.co/600x400" alt="">
                    <h2 class="cardTitulo">Anteojos</h2>
                </div>

                <div class="cardFooter">
                    <div>
                        <div class="cantidad">
                            <button class="cantidad-btn resta">−</button>
                            <span class="cantidadValor">1</span>
                            <button class="cantidad-btn suma">+</button>
                        </div>
                        <span class="precio">$100</span>
                    </div>
                    
                </div>

            </div>


            <!-- formulario de envío -->
            <div class="formEnvio">
                <h3>Datos de envío</h3>

                <form class="row g-3">
                    <div class="col-md-6">
                        <label for="inputNombre4" class="form-label">Nombre</label>
                        <input type="email" class="form-control" id="inputNombre4">
                    </div>

                    <div class="col-md-6">
                        <label for="inputApellido4" class="form-label">Apellido</label>
                        <input type="password" class="form-control" id="inputApellido4">
                    </div>
                    <div class="col-12">
                        <label for="inputDirreccion" class="form-label">Dirreccion</label>
                        <input type="text" class="form-control" id="inputDirreccion" placeholder="1234 Main St">
                    </div>


                    <div class="col-md-6">
                        <label for="inputCity" class="form-label">Ciudad</label>
                        <input type="text" class="form-control" id="inputCity">
                    </div>

                    <div class="col-md-4">
                        <label for="inputState" class="form-label">Privincia</label>
                        <select id="inputState" class="form-select">
                        <option selected>Seleccione...</option>
                        <option>Buenos Aires</option>
                        <option>Catamarca</option>
                        <option>Chaco</option>
                        <option>Chubut</option>
                        <option>Córdoba</option>
                        <option>Corrientes</option>
                        <option>Entre Ríos</option>
                        <option>Formosa</option>
                        <option>Jujuy</option>
                        <option>La Pampa</option>
                        <option>La Rioja</option>
                        <option>Mendoza</option>
                        <option>Misiones</option>
                        <option>Neuquén</option>
                        <option>Río Negro</option>
                        <option>Salta</option>
                        <option>San Juan</option>
                        <option>San Luis</option>
                        <option>Santa Cruz</option>
                        <option>Santa Fe</option>
                        <option>Santiago del Estero</option>
                        <option>Tierra del Fuego</option>
                        <option>Tucumán</option>
                        <option>Ciudad Autónoma de Buenos Aires</option>
                        </select>
                    </div>
                </form>

            </div>

        </div>


        





        <!--Menu de checkout precio y btn comprar-->

        <div class="menuTotal">
            <div class="summary">

                <p class="summary-label">RESUMEN</p>
                <h2 class="summary-title">Tu compra</h2>

                <div class="summary-items">
                    <div class="item">
                    <span><strong>1x</strong> Anteojos</span>
                    <span>$ 100</span>
                    </div>

                    <div class="item">
                    <span><strong>1x</strong> Smartwatch</span>
                    <span>$ 250</span>
                    </div>

                
                </div>

                <hr>

                <div class="summary-totals">
                    <div class="row">
                    <span>Subtotal</span>
                    <span>$ 183.996</span>
                    </div>
                    <div class="row">
                    <span>Envío</span>
                    <span>$ 7.500</span>
                    </div>
                    <div class="row">
                    <span>IVA (21%)</span>
                    <span>$ 38.639</span>
                    </div>
                </div>

                <hr>

                <div class="summary-total">
                    <span>Total</span>
                    <span>$ 230.135</span>
                </div>

                <div class="buttonsCheckout">
                    <button type="button" class="btn btn-primary">Finalizar pedido</button>
                    <button type="button" class="btn btn-light">Seguir comprando</button>
                </div>

            </div>
        </div>


    </section>
    
</body>
</html>
